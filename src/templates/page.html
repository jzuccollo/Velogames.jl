<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      {{css}}
    </style>
    {{plotly_script}}
  </head>
  <body style="--accent: {{accent}}">
    <header class="page-header">
      <div class="header-content">
        {{home_link}}
        <h1>{{title}}</h1>
        {{subtitle}}
      </div>
    </header>
    <div class="page-body">
      <main class="content">{{body}}</main>
      <nav id="toc"></nav>
    </div>
    {{toc_script}}
  </body>
</html>
